name: Collect Praxio Data (Completa / Histórico)

on:
  workflow_dispatch:   # Somente disparo manual

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Cache Playwright
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-chromium-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright (sem cache)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: Install Playwright deps (com cache)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Coleta completa (todo o histórico)
        run: npx tsx scripts/collect.ts
        env:
          MODO_COLETA: completa
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PORTAL_EMAIL: ${{ secrets.PORTAL_EMAIL }}
          PORTAL_SENHA: ${{ secrets.PORTAL_SENHA }}
          HORA_INICIO_UTIL: 8
          HORA_FIM_UTIL: 18
