name: Backfill Mensal (importação completa e confiável)

# Importa TODOS os tickets dos 5 grupos, mês a mês (evita o limite de export do
# portal). Disparo manual — rode uma vez para popular o banco com todo o histórico.

on:
  workflow_dispatch:
    inputs:
      inicio:
        description: 'Mês inicial (piso) no formato YYYY-MM'
        required: false
        default: '2022-01'

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Cache Playwright
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-chromium-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright (sem cache)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: Install Playwright deps (com cache)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Backfill mensal (todo o histórico)
        run: npx tsx scripts/collect.ts
        env:
          MODO_COLETA: mensal
          COLETA_INICIO: ${{ github.event.inputs.inicio }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PORTAL_EMAIL: ${{ secrets.PORTAL_EMAIL }}
          PORTAL_SENHA: ${{ secrets.PORTAL_SENHA }}
          HORA_INICIO_UTIL: 8
          HORA_FIM_UTIL: 18
