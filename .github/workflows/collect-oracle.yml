name: Collect via Oracle (direto no banco)

on:
  workflow_dispatch:   # agendamento desligado (coletor Oracle alternativo, não usado)
    inputs:
      modo:
        description: "collect ou discover (lista tabelas)"
        required: false
        default: "collect"

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - name: Coleta via Oracle
        run: npx tsx scripts/collect-oracle.ts
        env:
          MODO_ORACLE: ${{ github.event.inputs.modo || "collect" }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          HORA_INICIO_UTIL: 8
          HORA_FIM_UTIL: 18
          ORACLE_HOST: ${{ secrets.ORACLE_HOST }}
          ORACLE_PORT: ${{ secrets.ORACLE_PORT }}
          ORACLE_SERVICE: ${{ secrets.ORACLE_SERVICE }}
          ORACLE_USER: ${{ secrets.ORACLE_USER }}
          ORACLE_PASSWORD: ${{ secrets.ORACLE_PASSWORD }}
