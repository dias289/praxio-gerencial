name: Recalcular SLA do Backlog (diário)

# Recalcula o "tempo útil sob o time" de todos os tickets em aberto.
# É mais pesado (acessa o detalhe de cada ticket), por isso roda 1x/dia.

on:
  schedule:
    - cron: '0 5 * * *'   # 05:00 UTC = 02:00 BRT
  workflow_dispatch:

jobs:
  sla:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Cache Playwright
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-chromium-${{ hashFiles('package-lock.json') }}
      - name: Install Playwright (sem cache)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps
      - name: Install Playwright deps (com cache)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
      - name: Recalcular SLA do backlog
        run: npx tsx scripts/collect-sla.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PORTAL_EMAIL: ${{ secrets.PORTAL_EMAIL }}
          PORTAL_SENHA: ${{ secrets.PORTAL_SENHA }}
          HORA_INICIO_UTIL: 8
          HORA_FIM_UTIL: 18
