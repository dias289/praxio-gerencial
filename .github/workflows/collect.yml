name: Collect Praxio Data

on:
  schedule:
    - cron: '*/30 * * * *'   # A cada 30 minutos
  workflow_dispatch:           # Disparo manual

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run collection
        run: npx tsx scripts/collect.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PORTAL_EMAIL: ${{ secrets.PORTAL_EMAIL }}
          PORTAL_SENHA: ${{ secrets.PORTAL_SENHA }}
          HORA_INICIO_UTIL: 8
          HORA_FIM_UTIL: 18
