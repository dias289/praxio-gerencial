name: Collect Praxio Data

on:
  schedule:
    - cron: '*/30 * * * *'   # A cada 30 minutos
  workflow_dispatch:           # Disparo manual

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium (com dependências)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: Install Playwright system deps only (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run collection
        run: npx tsx scripts/collect.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PORTAL_EMAIL: ${{ secrets.PORTAL_EMAIL }}
          PORTAL_SENHA: ${{ secrets.PORTAL_SENHA }}
          HORA_INICIO_UTIL: 8
          HORA_FIM_UTIL: 18
